<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alderton</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --linen:  #F4EDE2;
      --earth:  #6B3F2A;
      --forest: #3D4E35;
      --stone:  #9B8C7C;
      --olive:  #7A8C68;
      --sand:   #D6C4A0;
      --soil:   #2C1A0E;
    }

    body {
      min-height: 100vh;
      background-color: var(--linen);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 24px;
      max-width: 560px;
      width: 100%;
    }

    /* LOGO */
    .logo-mark {
      width: 88px;
      height: 88px;
      margin-bottom: 24px;
    }

    /* WORDMARK */
    .wordmark {
      font-family: 'Cinzel', serif;
      font-size: clamp(38px, 9vw, 68px);
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--earth);
      line-height: 1;
      margin-bottom: 18px;
    }

    /* RULE */
    .rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--stone), transparent);
      margin-bottom: 18px;
      opacity: 0.5;
    }

    /* TAGLINE */
    .tagline {
      font-family: 'Cinzel', serif;
      font-size: clamp(9px, 1.8vw, 12px);
      font-weight: 400;
      letter-spacing: 0.28em;
      color: var(--stone);
      text-transform: uppercase;
      margin-bottom: 80px;
    }

    /* PILLARS */
    .pillars {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.24em;
      color: var(--olive);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* FORM */
    .form {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
      gap: 12px;
      margin-bottom: 16px;
    }

    .input-wrapper {
      width: 100%;
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 12px 0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--stone);
      color: var(--soil);
      outline: none;
      text-align: center;
      letter-spacing: 0.04em;
      transition: border-color 0.2s;
    }

    .form-input::placeholder {
      color: var(--stone);
      opacity: 0.8;
    }

    .form-input:focus {
      border-bottom-color: var(--earth);
    }

    .form-button {
      width: 100%;
      padding: 14px;
      background-color: var(--forest);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--linen);
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .form-button:hover {
      background-color: var(--earth);
    }

    /* NO SPAM */
    .no-spam {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--stone);
      letter-spacing: 0.06em;
    }

    @media (max-width: 480px) {
      .wordmark { letter-spacing: 0.14em; }
      .tagline  { letter-spacing: 0.18em; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- LOGO MARK -->
    <img class="logo-mark" src="alderton_logo_transparent.png" alt="Alderton logo" />

    <!-- WORDMARK -->
    <h1 class="wordmark">ALDERTON</h1>

    <!-- RULE -->
    <div class="rule"></div>

    <!-- TAGLINE -->
    <p class="tagline">Elevate Your Everyday</p>

    <!-- PILLARS -->
    <p class="pillars">Body &middot; Mind &middot; Lifestyle</p>

    <!-- FORM -->
    <form class="form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div class="input-wrapper">
        <input class="form-input" type="email" name="email" placeholder="Your email address" required />
      </div>
      <button class="form-button" type="submit">Join the Waitlist</button>
    </form>

    <!-- NO SPAM -->
    <p class="no-spam">No spam. Ever. Just the moment Alderton goes live.</p>

  </div>
</body>
</html>
