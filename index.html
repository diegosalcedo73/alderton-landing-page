<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alderton</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #F4EDE2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 24px;
      max-width: 560px;
      width: 100%;
    }

    .mark {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
    }

    .wordmark {
      font-family: 'Cinzel', serif;
      font-size: clamp(38px, 9vw, 64px);
      font-weight: 600;
      letter-spacing: 0.22em;
      color: #6B3F2A;
      line-height: 1;
      margin-bottom: 16px;
    }

    .rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, #9B8C7C, transparent);
      margin-bottom: 14px;
      opacity: 0.6;
    }

    .tagline {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.28em;
      color: #9B8C7C;
      text-transform: uppercase;
      margin-bottom: 56px;
    }

    .pillars {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.24em;
      color: #7A8C68;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
