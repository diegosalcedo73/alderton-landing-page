<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alderton</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #F4EDE2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 24px;
      max-width: 560px;
      width: 100%;
    }

    .logo-mark {
  width: 160px;
  height: 160px;
  margin-bottom: 24px;
    }

    .wordmark {
      font-family: 'Cinzel', serif;
      font-size: clamp(38px, 9vw, 68px);
      font-weight: 600;
      letter-spacing: 0.22em;
      color: #6B3F2A;
      line-height: 1;
      margin-bottom: 18px;
    }

    .rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, #9B8C7C, transparent);
      margin-bottom: 18px;
      opacity: 0.5;
    }

    .tagline {
      font-family: 'Cinzel', serif;
      font-size: clamp(9px, 1.8vw, 12px);
      font-weight: 400;
      letter-spacing: 0.28em;
      color: #6B3F2A;
      text-transform: uppercase;
      margin-bottom: 80px;
    }

    .pillars {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.24em;
      color: #7A8C68;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .form {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-input {
      width: 100%;
      padding: 12px 0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      background: transparent;
      border: none;
      border-bottom: 1px solid #9B8C7C;
      color: #2C1A0E;
      outline: none;
      text-align: center;
      letter-spacing: 0.04em;
      transition: border-color 0.2s;
    }

    .form-input::placeholder {
      color: #9B8C7C;
      opacity: 0.8;
    }

    .form-input:focus {
      border-bottom-color: #6B3F2A;
    }

    .form-button {
      width: 100%;
      padding: 14px;
      background-color: #3D4E35;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: #F4EDE2;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .form-button:hover {
      background-color: #6B3F2A;
    }

    .no-spam {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: #9B8C7C;
      letter-spacing: 0.06em;
    }

    @media (max-width: 480px) {
      .wordmark { letter-spacing: 0.14em; }
      .tagline  { letter-spacing: 0.18em; }
    }
  </style>
</head>
<body>
  <div class="container">

    <img class="logo-mark" src="alderton_logo_earth.png" alt="Alderton logo" />

    <h1 class="wordmark">ALDERTON</h1>

    <div class="rule"></div>

    <p class="tagline">Elevate Your Everyday</p>

    <p class="pillars">Body &middot; Mind &middot; Lifestyle</p>

    <form class="form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input class="form-input" type="email" name="email" placeholder="Your email address" required />
      <button class="form-button" type="submit">Join the Waitlist</button>
    </form>

    <p class="no-spam">No spam. Ever. Just the moment Alderton goes live.</p>

  </div>
</body>
</html>
